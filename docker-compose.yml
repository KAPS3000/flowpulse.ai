services:
  # ── Storage ────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--js", "--sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--save", "60", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Application ────────────────────────────────────────────
  aggregator:
    build:
      context: .
      dockerfile: docker/Dockerfile.aggregator
    ports:
      - "9091:9091"
      - "9092:9092"
    environment:
      FLOWPULSE_CLICKHOUSE_DSN: "clickhouse://clickhouse:9000"
      FLOWPULSE_NATS_URL: "nats://nats:4222"
    depends_on:
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      FLOWPULSE_CLICKHOUSE_DSN: "clickhouse://clickhouse:9000"
      FLOWPULSE_NATS_URL: "nats://nats:4222"
      FLOWPULSE_REDIS_ADDR: "redis:6379"
      FLOWPULSE_JWT_SECRET: "flowpulse-local-dev-secret"
    depends_on:
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXT_PUBLIC_WS_URL: "ws://localhost:8080/ws"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  clickhouse_data:
  nats_data:
  redis_data:

node_id: "lima-vm"
tenant_id: "local-dev"

ebpf:
  poll_interval: 2s
  flow_timeout: 30s
  max_flows: 100000
  interfaces: ["eth0"]
  bpf_object_dir: /home/ksuri.linux/flowpulse/bpf

aggregator:
  address: "192.168.5.2:9092"  # Mac host gateway → Docker aggregator HTTP ingest
  batch_size: 500
  flush_interval: 2s
  max_retry: 3

health:
  listen: ":8081"

log:
  level: debug
  format: console

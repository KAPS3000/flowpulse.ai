apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flowpulse-agent
  namespace: flowpulse
  labels:
    app.kubernetes.io/name: flowpulse-agent
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: flowpulse-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flowpulse-agent
        app.kubernetes.io/component: agent
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        flowpulse.io/monitor: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      serviceAccountName: flowpulse-agent
      containers:
        - name: agent
          image: flowpulse-agent:latest
          args:
            - --config=/etc/flowpulse/agent.yaml
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - BPF
                - PERFMON
                - NET_ADMIN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/flowpulse
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: debugfs
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: sysfs
              mountPath: /sys/class/infiniband
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: flowpulse-agent-config
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: sysfs
          hostPath:
            path: /sys/class/infiniband
            type: DirectoryOrCreate

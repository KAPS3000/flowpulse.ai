apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flowpulse.fullname" . }}-server-config
  namespace: {{ include "flowpulse.namespace" . }}
  labels:
    {{- include "flowpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
data:
  server.yaml: |
    api:
      rest_listen: ":8080"
      grpc_listen: ":9090"
      ws_path: /ws

    auth:
      jwt_secret_env: FLOWPULSE_JWT_SECRET
      token_expiry: 24h

    aggregator:
      grpc_listen: ":9091"
      shard_id: 0
      batch_size: {{ .Values.aggregator.batchSize }}
      flush_interval: {{ .Values.aggregator.flushInterval | quote }}

    clickhouse:
      dsn_env: FLOWPULSE_CLICKHOUSE_DSN
      database: {{ .Values.clickhouse.database }}
      max_open_conns: 10
      max_idle_conns: 5

    nats:
      url_env: FLOWPULSE_NATS_URL
      stream: {{ .Values.nats.stream }}
      max_pending: 65536

    redis:
      addr_env: FLOWPULSE_REDIS_ADDR
      db: 0
      pool_size: 10

    log:
      level: info
      format: json

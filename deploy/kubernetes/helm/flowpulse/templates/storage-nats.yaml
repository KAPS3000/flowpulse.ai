{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "flowpulse.fullname" . }}-nats
  namespace: {{ include "flowpulse.namespace" . }}
  labels:
    {{- include "flowpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  serviceName: {{ include "flowpulse.fullname" . }}-nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "flowpulse.name" . }}-nats
      {{- include "flowpulse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "flowpulse.name" . }}-nats
        app.kubernetes.io/component: nats
        {{- include "flowpulse.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nats
          image: "{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
          args: ["--js", "--sd", "/data"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.nats.storage.storageClassName }}
        storageClassName: {{ .Values.nats.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.nats.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flowpulse.fullname" . }}-nats
  namespace: {{ include "flowpulse.namespace" . }}
  labels:
    {{- include "flowpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "flowpulse.name" . }}-nats
    {{- include "flowpulse.selectorLabels" . | nindent 4 }}
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: monitor
      port: 8222
      targetPort: monitor
{{- end }}

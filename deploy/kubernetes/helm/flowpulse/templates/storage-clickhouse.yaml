{{- if .Values.clickhouse.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "flowpulse.fullname" . }}-clickhouse
  namespace: {{ include "flowpulse.namespace" . }}
  labels:
    {{- include "flowpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: {{ include "flowpulse.fullname" . }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "flowpulse.name" . }}-clickhouse
      {{- include "flowpulse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "flowpulse.name" . }}-clickhouse
        app.kubernetes.io/component: clickhouse
        {{- include "flowpulse.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          env:
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.storage.storageClassName }}
        storageClassName: {{ .Values.clickhouse.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flowpulse.fullname" . }}-clickhouse
  namespace: {{ include "flowpulse.namespace" . }}
  labels:
    {{- include "flowpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "flowpulse.name" . }}-clickhouse
    {{- include "flowpulse.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
{{- end }}

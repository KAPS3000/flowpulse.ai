apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "flowpulse.fullname" . }}-agent
  namespace: {{ include "flowpulse.namespace" . }}
  labels:
    {{- include "flowpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "flowpulse.name" . }}-agent
      {{- include "flowpulse.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "flowpulse.name" . }}-agent
        app.kubernetes.io/component: agent
        {{- include "flowpulse.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-agent.yaml") . | sha256sum }}
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        {{- with .Values.agent.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      serviceAccountName: {{ include "flowpulse.fullname" . }}-agent
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ include "flowpulse.image" (dict "global" .Values.global "image" .Values.agent.image) }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args:
            - --config=/etc/flowpulse/agent.yaml
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - BPF
                - PERFMON
                - NET_ADMIN
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/flowpulse
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: debugfs
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: sysfs
              mountPath: /sys/class/infiniband
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "flowpulse.fullname" . }}-agent-config
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: sysfs
          hostPath:
            path: /sys/class/infiniband
            type: DirectoryOrCreate

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "flowpulse.fullname" . }}
  namespace: {{ include "flowpulse.namespace" . }}
  labels:
    {{- include "flowpulse.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "flowpulse.fullname" . }}-server
                port:
                  name: http
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "flowpulse.fullname" . }}-server
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ include "flowpulse.fullname" . }}-server
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "flowpulse.fullname" . }}-web
                port:
                  name: http
{{- end }}
